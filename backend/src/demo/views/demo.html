<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wombto18 Foundation - Demo Request</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f7fafc; padding: 2rem; color: #2d3748; }
        .container { max-width: 500px; margin: auto; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; text-align: center; color: #1a365d; }
        label { display: block; margin-top: 1rem; font-weight: bold; }
        input { width: 100%; padding: 0.75rem; margin-top: 0.5rem; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box;}
        button { width: 100%; padding: 0.75rem; margin-top: 1.5rem; background: #3182ce; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        button:hover { background: #2b6cb0; }
        .hidden { display: none; }
        .success { text-align: center; margin-top: 2rem; }
        .btn-green { background: #38a169; margin-bottom: 1rem; }
        .btn-green:hover { background: #2f855a; }
        .footer { text-align: center; font-size: 12px; margin-top: 2rem; color: #a0aec0; }
    </style>
</head>
<body>
    <div class="container" id="formContainer">
        <h1>Wombto18 Foundation <br>Donation Form</h1>
        <form id="donateForm">
            <label>Full Name</label>
            <input type="text" id="name" required placeholder="John Doe">
            <label>Email Address</label>
            <input type="email" id="email" required placeholder="john@example.com">
            <label>Mobile Number</label>
            <input type="text" id="mobile" required placeholder="9876543210">
            <label>PAN Card Number (Required for 80G)</label>
            <input type="text" id="pan" placeholder="ABCDE1234F">
            <label>Full Address</label>
            <input type="text" id="address" placeholder="123 Example Street, City, State 100001">
            <label>Donation Amount (₹)</label>
            <input type="number" id="amount" required min="100" placeholder="5000" value="5000">
            <button type="submit">Complete Payment (Dummy)</button>
        </form>
    </div>

    <div class="container hidden" id="successContainer">
        <div class="success">
            <h1 style="color: #38a169;">Dummy Razorpay Payment Successful!</h1>
            <p>Your contribution data has been injected. You may now retrieve the server-generated PDFs.</p>
            <br>
            <button class="btn-green" onclick="downloadReceipt()">Download Donation Receipt</button>
            <button class="btn-green" id="btn80g" onclick="download80G()">Download 80G Tax Certificate</button>
        </div>
        <p class="footer">The 80G certificate button is hidden if donation is < ₹5000.</p>
    </div>

    <script>
        let currentDonationId = null;

        document.getElementById('donateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                mobile: document.getElementById('mobile').value,
                pan: document.getElementById('pan').value,
                address: document.getElementById('address').value,
                amount: document.getElementById('amount').value
            };

            const res = await fetch('/api/demo/donate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await res.json();
            if (result.success) {
                currentDonationId = result.donationId;
                document.getElementById('formContainer').classList.add('hidden');
                document.getElementById('successContainer').classList.remove('hidden');
                
                if (parseInt(data.amount) < 5000) {
                    document.getElementById('btn80g').style.display = 'none';
                } else {
                    document.getElementById('btn80g').style.display = 'block';
                }
            } else {
                alert('Donation failed. Check server logs.');
            }
        });

        function downloadReceipt() {
            window.location.href = `/api/donor/receipts/download/${currentDonationId}`;
        }

        function download80G() {
            window.location.href = `/api/certificates/download/${currentDonationId}`;
        }
    </script>
</body>
</html>
